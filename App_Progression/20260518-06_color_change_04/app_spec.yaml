app:
  name: color_change_04
  type: browser_app
  goal: Build a school-policy-constrained background color app generated by an LLM.

llm:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.1

ui:
  title: School Brand Color Picker
  structure:
    controls:
      - type: select
        id: schoolSelect
        label: School policy
      - type: div
        id: colorButtons
        class_name: button-grid
      - type: select
        id: colorSelect
        label: Choose color

behavior:
  state:
    selected_school_id: michigan
    selected_color: null
  events:
    - id: init
      source: app
      event: load
      actions:
        - render_schools
        - render_colors_for_selected_school
        - apply_first_allowed_color
    - id: school_change
      source: schoolSelect
      event: change
      actions:
        - render_colors_for_selected_school
        - apply_first_allowed_color
    - id: color_change
      source: colorSelect
      event: change
      actions:
        - apply_selected_color_if_allowed
    - id: color_button_click
      source: colorButtons
      event: click
      actions:
        - apply_clicked_color_if_allowed

guardrails:
  policy_source:
    type: markdown_yaml_block
    path: policies/school_policies.md
  required_policy_ids:
    - michigan
    - stanford
  default_policy_id: michigan
  enforce_only_allowed_colors: true

output_root: generated
required_files:
  - generated/index.html
  - generated/styles.css
  - generated/script.js

tests:
  - id: html-has-required-controls
    description: Generated HTML includes school selector, color selector, and color button container IDs.
  - id: js-enforces-policy-colors
    description: Generated JS contains policy map and only uses allowed policy colors for runtime changes.
  - id: app-loads-with-default-policy
    description: Initial render picks default policy and applies first allowed color.

validation:
  rules:
    - id: required-files-present
      severity: error
      check: generated_output_contains_required_files
    - id: required-selectors-present
      severity: error
      check: generated_html_contains_configured_ids
    - id: policy-ids-present
      severity: error
      check: generated_js_contains_required_policy_ids
    - id: allowed-colors-only
      severity: error
      check: generated_js_uses_only_allowed_colors
  auto_repair:
    enabled: true
    max_attempts: 3
    include_previous_output: true
    feedback_fields:
      - errors
      - failed_rules
      - missing_files

prompting:
  task_prompt_path: prompts/task_prompt.md
  output_contract:
    format: json_object
    description: Return one JSON object where keys are relative file paths and values are file contents.
    required_keys:
      - generated/index.html
      - generated/styles.css
      - generated/script.js
