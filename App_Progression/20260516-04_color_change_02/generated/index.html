<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Change 02</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Color Change 02</h1>
    <div class="button-grid">
    <button type="button" id="btnBlue" data-color="blue">Blue</button>
    <button type="button" id="btnRed" data-color="red">Red</button>
    <button type="button" id="btnGreen" data-color="green">Green</button>
    <button type="button" id="btnYellow" data-color="yellow">Yellow</button>
    <button type="button" id="btnPurple" data-color="purple">Purple</button>
    <button type="button" id="btnOrange" data-color="orange">Orange</button>
    </div>
    <label for="colorSelect">Pick a color</label>
    <select id="colorSelect">
          <option value="white">White</option>
          <option value="blue">Blue</option>
          <option value="red">Red</option>
          <option value="green">Green</option>
          <option value="yellow">Yellow</option>
          <option value="purple">Purple</option>
          <option value="orange">Orange</option>
          <option value="black">Black</option>
    </select>
  </main>
  <script src="script.js"></script>
</body>
</html>
